<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10182b">
<title>Тренажёр ФИО и должностей</title>
<style>
:root {
  --bg: #0c1425;
  --bg-soft: #131d34;
  --panel: rgba(18, 27, 46, 0.92);
  --panel-2: rgba(22, 33, 58, 0.92);
  --line: rgba(148,163,184,.14);
  --text: #f8fafc;
  --muted: #94a3b8;
  --muted-2: #cbd5e1;
  --accent: #6366f1;
  --accent-2: #8b5cf6;
  --good: #22c55e;
  --bad: #ef4444;
  --warn: #f59e0b;
  --shadow: 0 18px 40px rgba(2,6,23,.24);
}
body.light {
  --bg: #eef3ff;
  --bg-soft: #dfe7ff;
  --panel: rgba(255,255,255,0.88);
  --panel-2: rgba(248,250,255,0.92);
  --line: rgba(99,102,241,.14);
  --text: #13203b;
  --muted: #5b6b88;
  --muted-2: #334155;
  --accent: #4f46e5;
  --accent-2: #7c3aed;
  --good: #16a34a;
  --bad: #dc2626;
  --warn: #d97706;
  --shadow: 0 18px 40px rgba(30,41,59,.12);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body {
  font-family: Inter, "Segoe UI", "SF Pro Display", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(99,102,241,.22), transparent 30%),
    radial-gradient(circle at top right, rgba(139,92,246,.18), transparent 28%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
  color: var(--text);
  min-height:100vh;
  overflow-y:auto;
  padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
}
.app { max-width: 760px; margin: 0 auto; min-height: 100%; display:flex; flex-direction:column; gap:14px; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.icon-btn, .back-btn {
  width:46px; height:46px; border:none; border-radius:14px; cursor:pointer;
  background: rgba(255,255,255,.08); color: var(--text); font-size:20px;
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--line);
}
.page-title { flex:1; text-align:center; color:var(--muted); font-size:14px; font-weight:700; }
.hero, .card, .panel {
  background: var(--panel);
  border:1px solid var(--line);
  border-radius: 26px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}
.hero { padding: 24px; overflow:hidden; position:relative; }
.hero::before {
  content:""; position:absolute; inset:0;
  background: radial-gradient(circle at 0 0, rgba(99,102,241,.14), transparent 26%),
              radial-gradient(circle at 100% 0, rgba(139,92,246,.12), transparent 24%);
  pointer-events:none;
}
.logo-wrap { display:flex; justify-content:center; margin-bottom:14px; }
.logo-wrap img { width: 120px; max-width: 36vw; height:auto; filter: drop-shadow(0 12px 24px rgba(0,0,0,.22)); }
.hero h1 { font-size: 34px; line-height:1.1; letter-spacing:-.03em; text-align:center; margin-bottom:10px; }
.hero p { color: var(--muted); text-align:center; max-width: 56ch; margin: 0 auto; line-height:1.55; }
.badge-row, .chip-row, .stats-pills { display:flex; gap:10px; flex-wrap:wrap; }
.badge, .pill, .group-chip {
  padding:8px 12px; border-radius:999px; border:1px solid var(--line);
  background: rgba(255,255,255,.05); color: var(--muted); font-size:13px; font-weight:700;
}
.group-grid { display:flex; flex-wrap:wrap; gap:10px; }
.group-chip {
  cursor:pointer; color:var(--muted-2);
}
.group-chip.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; border-color:transparent; }
.section-title { font-size:18px; font-weight:800; margin-bottom:12px; }
.grid-3 { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:12px; }
.stat-card {
  background: var(--panel-2); border:1px solid var(--line); border-radius:18px; padding:16px; text-align:center;
}
.stat-card .num { font-size:30px; font-weight:900; line-height:1; margin-bottom:6px; }
.stat-card .label { color: var(--muted); font-size:12px; }
.menu-btn {
  width:100%; border:none; border-radius:20px; padding:18px; cursor:pointer; text-align:left;
  display:flex; gap:14px; align-items:center; background: var(--panel-2); color: var(--text);
  border:1px solid var(--line); box-shadow: var(--shadow);
}
.menu-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color:transparent; }
.menu-btn .emoji { font-size:26px; width:36px; text-align:center; }
.menu-btn .title { font-size:16px; font-weight:800; }
.menu-btn .sub { font-size:12px; color: var(--muted); margin-top:4px; line-height:1.45; }
.menu-btn.primary .sub { color: rgba(255,255,255,.78); }
.filters { display:grid; gap:12px; }
.mode-selector, .difficulty-selector {
  display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:8px; background: rgba(255,255,255,.04); padding:6px; border-radius:18px;
}
.mode-btn, .difficulty-btn {
  border:none; padding:12px 10px; border-radius:14px; cursor:pointer; background:transparent; color:var(--muted); font-weight:800; font-size:12px;
}
.mode-btn.active, .difficulty-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; }
.card { padding:22px; }
.phase-dots { display:flex; justify-content:center; gap:8px; }
.phase-dot { width:10px; height:10px; border-radius:999px; background: rgba(255,255,255,.14); }
.phase-dot.active { background: var(--accent); box-shadow: 0 0 16px rgba(99,102,241,.45); }
.phase-dot.done { background: var(--good); }
.phase-label { text-align:center; color: var(--muted); font-size:13px; font-weight:700; }
.progress { height:8px; border-radius:999px; overflow:hidden; background: rgba(255,255,255,.08); }
.progress > div { height:100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius:999px; transition: width .25s ease; }
.question-label { display:inline-flex; gap:8px; align-items:center; padding:8px 12px; border-radius:999px; background: rgba(255,255,255,.05); border:1px solid var(--line); color:var(--muted); font-size:12px; font-weight:800; margin-bottom:14px; }
.question { font-size: 31px; line-height:1.28; letter-spacing:-.02em; font-weight:900; word-break:break-word; }
.question.small { font-size:25px; }
.answer-preview {
  margin-top:16px; padding:14px 16px; border-radius:18px; background: rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.18); color:#c7d2fe;
  font-size:18px; font-weight:700; line-height:1.45;
}
.input {
  width:100%; border-radius:16px; border:2px solid rgba(148,163,184,.2); background: rgba(8,15,30,.55); color:var(--text);
  padding:16px 18px; font-size:17px; outline:none;
}
body.light .input { background: rgba(255,255,255,.9); }
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,.12); }
.input.correct { border-color: var(--good); background: rgba(34,197,94,.08); }
.input.wrong { border-color: var(--bad); background: rgba(239,68,68,.08); }
.btn {
  border:none; cursor:pointer; border-radius:16px; min-height:52px; padding:14px 18px; font-size:15px; font-weight:800;
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
}
.btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; }
.btn.secondary { background: var(--panel-2); color: var(--text); border:1px solid var(--line); }
.btn.good { background: linear-gradient(135deg, #16a34a, #22c55e); color:#fff; }
.btn.bad { background: linear-gradient(135deg, #dc2626, #ef4444); color:#fff; }
.btn.warn { background: linear-gradient(135deg, #d97706, #f59e0b); color:#fff; }
.options { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:10px; }
.option-btn {
  border:2px solid rgba(148,163,184,.18); background: rgba(8,15,30,.45); color:var(--text); border-radius:18px; min-height:74px; padding:16px; cursor:pointer;
  text-align:left; font-size:14px; line-height:1.45; font-weight:700;
}
body.light .option-btn { background: rgba(255,255,255,.78); }
.option-btn.correct { border-color: var(--good); background: rgba(34,197,94,.12); }
.option-btn.wrong { border-color: var(--bad); background: rgba(239,68,68,.12); }
.feedback { text-align:center; }
.feedback-title { font-size:22px; font-weight:900; margin-bottom:6px; }
.feedback-title.good { color: var(--good); }
.feedback-title.bad { color: var(--bad); }
.directory-list, .stats-list { display:flex; flex-direction:column; gap:10px; }
.list-item {
  padding:16px; border-radius:18px; border:1px solid var(--line); background: var(--panel-2);
}
.list-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.list-name { font-size:16px; font-weight:900; line-height:1.35; }
.list-position { color: var(--muted); font-size:14px; line-height:1.45; margin-top:5px; }
.list-group { margin-top:8px; font-size:12px; color: var(--muted); }
.star-btn {
  width:36px; height:36px; min-width:36px; border-radius:12px; border:1px solid var(--line); background: rgba(255,255,255,.05); color:#fbbf24; cursor:pointer;
}
.muted { color: var(--muted); }
.tiny { font-size:12px; }
.footer { margin-top:auto; padding:8px 0 2px; text-align:center; color:var(--muted); font-size:13px; }
.footer span { display:inline-block; padding:10px 14px; border-radius:999px; border:1px solid var(--line); background: rgba(255,255,255,.05); }

.avatar {
  width: 100px;
  height: 100px;
  min-width: 100px;
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.05);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: var(--shadow);
}
.avatar.small { width:76px; height:76px; min-width:76px; border-radius:18px; }
.avatar img { width:100%; height:100%; object-fit:cover; display:block; }
.avatar.clickable { cursor: zoom-in; transition: transform .18s ease, box-shadow .18s ease; }
.avatar.clickable:hover { transform: scale(1.03); }
.avatar.clickable:active { transform: scale(.98); }
.photo-modal { position:fixed; inset:0; z-index:1400; background: rgba(2,6,23,.86); display:flex; align-items:center; justify-content:center; padding:20px; }
.photo-modal.hidden { display:none !important; }
.photo-modal-card { width:100%; max-width:min(92vw, 760px); background: var(--panel); border:1px solid var(--line); border-radius:24px; box-shadow: var(--shadow); overflow:hidden; }
.photo-modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); }
.photo-modal-title { font-size:16px; font-weight:900; line-height:1.35; }
.photo-modal-sub { color: var(--muted); font-size:13px; line-height:1.45; margin-top:4px; }
.photo-modal-close { width:42px; height:42px; min-width:42px; border-radius:14px; border:1px solid var(--line); background: rgba(255,255,255,.05); color: var(--text); cursor:pointer; font-size:18px; }
.photo-modal-image-wrap { display:flex; align-items:center; justify-content:center; padding:16px; background: rgba(255,255,255,.03); }
.photo-modal-image { max-width:100%; max-height:72vh; width:auto; height:auto; display:block; border-radius:20px; object-fit:contain; }
.avatar-fallback {
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, rgba(99,102,241,.22), rgba(139,92,246,.22));
  color: var(--text); font-weight:900; font-size:20px; text-transform:uppercase;
}
.person-head { display:flex; gap:16px; align-items:flex-start; }
.person-head-main { flex:1; min-width:0; }
.alias-line { margin-top:8px; color: var(--muted); font-size:13px; line-height:1.45; }
.kbd-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.kbd {
  display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:28px; padding:0 8px;
  border-radius:10px; background: rgba(255,255,255,.06); border:1px solid var(--line); color: var(--muted-2); font-size:12px; font-weight:800;
}
.photo-guide code {
  display:block; margin-top:6px; padding:10px 12px; border-radius:12px; background: rgba(255,255,255,.05); border:1px solid var(--line); color: var(--muted-2);
  font-size:12px; overflow-wrap:anywhere;
}

.settings-grid { display:grid; gap:14px; }
.flashcard {
  min-height: 280px; perspective: 1200px;
}
.flashcard-inner {
  position: relative; width:100%; min-height:280px; transform-style: preserve-3d; transition: transform .55s ease;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flash-side {
  position:absolute; inset:0; padding:22px; border-radius:24px; backface-visibility:hidden; background: var(--panel); border:1px solid var(--line); box-shadow: var(--shadow);
  display:flex; flex-direction:column; justify-content:center;
}
.flash-side.back { transform: rotateY(180deg); }
.search-wrap { display:grid; gap:12px; }
.notice {
  padding:14px 16px; border-radius:18px; border:1px solid var(--line); background: rgba(245,158,11,.1); color: #fde68a; font-size:14px; line-height:1.5;
}
.toast {
  position: fixed; left:50%; bottom: 18px; transform: translateX(-50%); z-index:999; background: rgba(15,23,42,.94); color:#fff; border:1px solid var(--line);
  padding:12px 16px; border-radius:14px; box-shadow: var(--shadow); font-size:14px; max-width:min(92vw, 520px);
}
.hidden { display:none !important; }
@media (max-width: 720px) {
  .grid-3 { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .options { grid-template-columns: 1fr; }
  .mode-selector, .difficulty-selector { grid-template-columns: 1fr; }
  .question { font-size: 26px; }
}
</style>
</head>

      <button class="photo-modal-close" onclick="closePhotoModal(event)">✕</button>

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  const dp = Array.from({ length: n + 1 }, (_, i) => [i]);
  for (let j = 1; j <= m; j++) dp[0][j] = j;
  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= m; j++) {
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + (b[i - 1] === a[j - 1] ? 0 : 1)

    }
  }
  return dp[n][m];
}

    state.queue.splice(insertAt, 0, idx);
  }

function afterQuestionResolved() {
  state.currentIdx += 1;
  state.feedback = null;
  state.selectedOption = null;
  state.input = "";
  state.hintShown = false;
  if (state.currentIdx >= state.queue.length) {
    state.currentFlowIndex += 1;
    if (state.currentFlowIndex >= state.phasesFlow.length) return showResults();
    state.queue = shuffle([...new Set(state.queue)]);
    state.currentIdx = 0;
    return startFlowPhase();
  }
  if (state.phaseName === "choice") state.options = buildChoiceOptions(getCurrentIndex(), state.mode, state.queue);
  render();
  focusInput();
}
function handleChoice(optionIdx) {
  if (state.feedback) return;
  const correctIdx = getCurrentIndex();
  const correct = optionIdx === correctIdx;
  state.selectedOption = optionIdx;
  state.feedback = correct ? "correct" : "wrong";
  if (correct) {
    state.stats.correct += 1; state.streak += 1; profile.maxStreak = Math.max(profile.maxStreak || 0, state.streak); vibrate(8); recordOutcome(correctIdx, "correct", "choice");
  } else {
    state.stats.wrong += 1; state.streak = 0; addToQueue(correctIdx, 1); vibrate([35,20,35]); recordOutcome(correctIdx, "wrong", "choice");
  }
  safeSet(STORAGE_KEYS.profile, profile);
  render();
  setTimeout(afterQuestionResolved, correct ? 380 : 980);
}
function skipChoice() {
  if (state.feedback) return;
  const idx = getCurrentIndex();
  state.feedback = "wrong";
  state.stats.skipped += 1;
  state.streak = 0;
  addToQueue(idx, 1);

}
function submitTyping() {
  if (state.feedback) return afterQuestionResolved();

  const idx = getCurrentIndex();
  const challenge = currentChallenge(getCurrentPerson(), state.mode);
  const correct = checkAnswer(state.input, challenge.answer);
  state.feedback = correct ? "correct" : "wrong";
  if (correct) {
    state.stats.correct += 1; state.streak += 1; profile.maxStreak = Math.max(profile.maxStreak || 0, state.streak); vibrate(8); recordOutcome(idx, "correct", "typing");

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.profile) profile = { ...defaultProfile, ...data.profile };
      if (data.settings) settings = { ...defaultSettings, ...data.settings };
      saveSettings();
      safeSet(STORAGE_KEYS.profile, profile);
      toast("Прогресс импортирован");
      goMenu();
    } catch (e) {
      toast("Не удалось импортировать файл");
    }
    event.target.value = "";
  };
  reader.readAsText(file);
}

                <div style="flex:1;min-width:0;">
                  <div class="list-name">${escapeHtml(item.name)}</div>
                  <div class="list-position">${escapeHtml(positionWithMarker(item.idx))}</div>
                  <div class="list-group">${escapeHtml(item.group)}</div>
                </div>
              </div>
              <button class="star-btn" onclick="toggleFavoriteAndRefresh(${item.idx})">${isFavorite(item.idx) ? "★" : "☆"}</button>
            </div>
            <div class="row" style="margin-top:12px;">
              <button class="btn secondary" onclick="quickTrainSingle(${item.idx})">Учить этого человека</button>
            </div>
          </div>
        `).join("") : `<div class="card"><div class="muted">Ничего не найдено.</div></div>`}
      </div>
    </div>
  `;
}

function renderStats() {
  const entries = PEOPLE.map((p, idx) => {
    const st = getPersonStat(idx);
    const attempts = st.correct + st.wrong + st.skipped;
    const accuracy = attempts ? Math.round((st.correct / attempts) * 100) : 0;
    return { idx, name: p.name, position: p.position, group: p.group, ...st, attempts, accuracy };
  }).sort((a,b) => (b.difficultScore||0) - (a.difficultScore||0) || (b.wrong||0)-(a.wrong||0)).slice(0, 12);
  const attempts = profile.totalCorrect + profile.totalWrong + profile.totalSkipped;
  const acc = attempts ? Math.round((profile.totalCorrect / attempts) * 100) : 0;
  return `
    ${renderHeader("Статистика")}
    <div class="grid-3">
      <div class="stat-card"><div class="num" style="color:var(--accent)">${attempts}</div><div class="label">Ответов всего</div></div>
      <div class="stat-card"><div class="num" style="color:var(--good)">${acc}%</div><div class="label">Точность</div></div>
      <div class="stat-card"><div class="num" style="color:var(--warn)">${formatTime(profile.totalStudyTime || 0)}</div><div class="label">Время в приложении</div></div>
    </div>
    <div class="card">
      <div class="section-title">Общий прогресс</div>
      <div class="stats-pills">
        <span class="pill">Правильно: ${profile.totalCorrect}</span>
        <span class="pill">Ошибки: ${profile.totalWrong}</span>
        <span class="pill">Пропуски: ${profile.totalSkipped}</span>
        <span class="pill">Сайт открыт: ${profile.siteOpenCount}</span>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Кто вызывает больше всего проблем</div>
      <div class="stats-list">
        ${entries.map(item => `
          <div class="list-item">
            <div class="list-name">${escapeHtml(item.name)}</div>
            <div class="list-position">${escapeHtml(item.position)}</div>
            <div class="stats-pills" style="margin-top:10px;">
              <span class="pill">Группа: ${escapeHtml(item.group)}</span>
              <span class="pill">Сложность: ${item.difficultScore || 0}</span>
              <span class="pill">Ошибки: ${item.wrong || 0}</span>
              <span class="pill">Точность: ${item.accuracy}%</span>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}
function renderSettings() {
  const examplePhoto = 'assets/people/kiselev-mihail-sergeevich.png';
  return `
    ${renderHeader("Настройки")}
    <div class="settings-grid">
      <div class="card">
        <div class="section-title">Оформление</div>
        <div class="row">
          <button class="btn ${settings.theme === "dark" ? "primary" : "secondary"}" onclick="settings.theme='dark'; saveSettings(); render()">🌙 Тёмная</button>
          <button class="btn ${settings.theme === "light" ? "primary" : "secondary"}" onclick="settings.theme='light'; saveSettings(); render()">☀️ Светлая</button>
        </div>
        <div class="row" style="margin-top:10px;">
          <button class="btn ${settings.showAvatars ? "primary" : "secondary"}" onclick="settings.showAvatars=!settings.showAvatars; saveSettings(); render()">🖼 ${settings.showAvatars ? "Аватары включены" : "Аватары выключены"}</button>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Прогресс</div>
        <div class="row">
          <button class="btn secondary" onclick="exportProgress()">⬇️ Экспорт</button>
          <button class="btn secondary" onclick="triggerImport()">⬆️ Импорт</button>
        </div>
        <input id="import-input" type="file" accept="application/json" class="hidden" onchange="importProgress(event)">
        <div class="notice" style="margin-top:12px;">Прогресс сохраняется на этом устройстве автоматически и восстанавливается после закрытия и повторного открытия сайта.</div>
      </div>
      
      <div class="card">
        <div class="section-title">Горячие клавиши на ПК</div>
        <div class="kbd-row"><span class="kbd">Enter</span><span class="kbd">1-4</span><span class="kbd">S</span><span class="kbd">H</span><span class="kbd">R</span><span class="kbd">Space</span><span class="kbd">←</span><span class="kbd">→</span></div>
      </div>
      <div class="card">
        <div class="section-title">Сброс</div>
        <div class="row">
          <button class="btn bad" onclick="if(confirm('Сбросить весь локальный прогресс?')){ profile={...defaultProfile,siteOpenCount:profile.siteOpenCount}; safeSet(STORAGE_KEYS.profile, profile); safeRemove(STORAGE_KEYS.session); toast('Прогресс сброшен'); goMenu(); }">Сбросить прогресс</button>
        </div>
      </div>
    </div>
  `;
}

function renderResults() {
  const result = state.lastResults || { known:[], toLearn:[], stats:{correct:0,wrong:0,skipped:0}, timeSpent:0 };
  const total = result.stats.correct + result.stats.wrong + result.stats.skipped;
  const acc = total ? Math.round((result.stats.correct / total) * 100) : 100;
  const mood = acc >= 85 ? ["🏆","Отличный результат"] : acc >= 60 ? ["👍","Неплохо"] : ["📌","Нужно повторить"];
  const mistakes = Object.keys(profile.todayMistakes[getTodayKey()] || {}).map(Number);
  return `
    <div class="card">
      <div class="feedback">
        <div style="font-size:72px; margin-bottom:10px;">${mood[0]}</div>
        <div class="feedback-title">${mood[1]}</div>
        <div class="muted">${escapeHtml(result.label || "Тренировка")}</div>
      </div>
      <div class="grid-3" style="margin-top:18px;">
        <div class="stat-card"><div class="num" style="color:var(--good)">${result.stats.correct}</div><div class="label">Верно</div></div>
        <div class="stat-card"><div class="num" style="color:var(--bad)">${result.stats.wrong}</div><div class="label">Ошибки</div></div>
        <div class="stat-card"><div class="num" style="color:var(--warn)">${acc}%</div><div class="label">Точность</div></div>
      </div>
      <div class="stats-pills" style="margin-top:14px;">
        <span class="pill">Пропуски: ${result.stats.skipped}</span>
        <span class="pill">Время: ${formatTime(result.timeSpent)}</span>
        <span class="pill">Режим: ${result.mode === "name-to-position" ? "ФИО → должность" : "Должность → ФИО"}</span>
        <span class="pill">Сложность: ${result.difficulty === "easy" ? "лёгкий" : result.difficulty === "medium" ? "средний" : "сложный"}</span>
      </div>
      <div class="row" style="margin-top:18px;">
        <button class="btn primary" onclick="startTraining()">Ещё раз</button>
        <button class="btn secondary" onclick="startTodayMistakes()">Ошибки за сегодня</button>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn secondary" onclick="openStats()">Открыть статистику</button>
        <button class="btn secondary" onclick="goMenu()">На главную</button>
      </div>
    </div>
  `;
}
function render() {
  const root = document.getElementById("app");
  let html = "";
  if (state.screen === "menu") html = renderMenu();
  else if (state.screen === "filter") html = renderFilter();
  else if (state.screen === "choice") html = renderChoice();
  else if (state.screen === "typing") html = renderTyping();
  else if (state.screen === "flashcards") html = renderFlashcards();
  else if (state.screen === "directory") html = renderDirectory();
  else if (state.screen === "stats") html = renderStats();
  else if (state.screen === "settings") html = renderSettings();
  else if (state.screen === "results") html = renderResults();
  root.innerHTML = html + renderFooter();
  saveSession();
  if (state.screen === "directory") {
    const search = document.getElementById("directory-search");
    if (search) {
      const pos = Number.isInteger(state.searchCursor) ? state.searchCursor : state.search.length;
      setTimeout(() => { search.focus(); search.setSelectionRange(pos, pos); }, 0);
    }
  }
}

document.addEventListener("keydown", (event) => {
  const modal = document.getElementById("photo-modal");
  if (modal && !modal.classList.contains("hidden")) {
    if (["Escape","Enter"," "].includes(event.key)) { event.preventDefault(); closePhotoModal(); }
    return;
  }
  const tag = (document.activeElement && document.activeElement.tagName || "").toLowerCase();
  const typingInputFocused = tag === "input" || tag === "textarea";
  if (state.screen === "typing") {
    if (event.key === "Enter") {
      event.preventDefault();
      submitTyping();
      return;
    }
    if (!typingInputFocused && event.key.toLowerCase() === "h" && !state.feedback && settings.difficulty !== "hard") {
      event.preventDefault(); showHint(); return;
    }
    if (!typingInputFocused && event.key.toLowerCase() === "s" && !state.feedback) {
      event.preventDefault(); skipTyping(); return;
    }
    if (!typingInputFocused && event.key.toLowerCase() === "r") {
      event.preventDefault(); reshuffleCurrent(); return;
    }
  }
  if (state.screen === "choice") {
    if (["1","2","3","4"].includes(event.key) && !state.feedback) {
      const idx = Number(event.key) - 1;
      if (state.options[idx] !== undefined) { event.preventDefault(); handleChoice(state.options[idx]); return; }
    }
    if (event.key.toLowerCase() === "s" && !state.feedback) { event.preventDefault(); skipChoice(); return; }
    if (event.key.toLowerCase() === "r") { event.preventDefault(); reshuffleCurrent(); return; }
  }
  if (state.screen === "flashcards") {
    if (event.key === " ") { event.preventDefault(); state.flashFlipped = !state.flashFlipped; render(); return; }
    if (event.key === "ArrowLeft") { event.preventDefault(); flashPrev(); return; }
    if (event.key === "ArrowRight") { event.preventDefault(); flashNext(); return; }
    if (event.key === "Enter") { event.preventDefault(); state.flashFlipped = !state.flashFlipped; render(); return; }
  }
});
(function init() {
  const saved = loadSession();
  if (saved && saved.screen && saved.screen !== "menu") state = saved;
  render();
})();
</script>
</body>
</html>
