  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI Variable", "Segoe UI", Inter, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.18), transparent 28%),
        linear-gradient(180deg, #0b1220 0%, #121a2f 55%, #161f3f 100%);
      color: #f8fafc;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-y: auto;
      padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom) 18px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 8px 0 0;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes streakFire {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      50% { transform: scale(1.08) rotate(3deg); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      min-height: 44px;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.10);
      border: none;
      border-radius: 12px;
      color: #f8fafc;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.15);
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 500;
    }

    .streak-badge {
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      animation: streakFire 0.5s ease-in-out infinite;
    }

    .phase-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      transition: all 0.3s;
    }

    .phase-dot.active {
      background: #6366f1;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }

    .phase-dot.done {
      background: #22c55e;
    }

    .phase-label {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .progress-container {
      margin-bottom: 16px;
    }

    .progress-bar {
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 3px;
      transition: width 0.3s ease-out;
    }

    .card {
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.10);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 16px 40px rgba(2, 6, 23, 0.26);
      animation: fadeIn 0.3s ease-out;
    }

    .card-glow {
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
    }

    .menu-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeIn 0.4s ease-out;
    }

    .menu-emoji {
      font-size: 72px;
      margin-bottom: 16px;
      animation: bounceIn 0.6s ease-out;
    }

    .menu-title {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .menu-subtitle {
      color: #64748b;
      font-size: 15px;
    }

    .menu-card {
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.10);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 14px 34px rgba(2, 6, 23, 0.20);
    }

    .stats-grid {
      display: flex;
      justify-content: space-around;
      text-align: center;
      margin-bottom: 16px;
      gap: 10px;
    }

    .stats-grid .num {
      font-size: 34px;
      font-weight: 800;
    }

    .stats-grid .label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 18px 20px;
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 18px;
      color: #f8fafc;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      text-align: left;
      box-shadow: 0 10px 26px rgba(2, 6, 23, 0.14);
    }

    .menu-btn:active {
      transform: scale(0.985);
      background: rgba(51, 65, 85, 0.96);
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, #6366f1 0%, #7c6cf2 45%, #8b5cf6 100%);
      border: none;
      box-shadow: 0 12px 28px rgba(99, 102, 241, 0.30);
    }

    .menu-btn-icon { font-size: 28px; }
    .menu-btn-text { flex: 1; }
    .menu-btn-sub { font-size: 12px; color: #94a3b8; font-weight: 400; margin-top: 2px; }
    .menu-btn.primary .menu-btn-sub { color: rgba(255,255,255,0.7); }

    .mode-selector {
      display: flex;
      background: #0f172a;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #6366f1;
      color: white;
    }

    .word-section {
      text-align: left;
      margin-bottom: 24px;
    }

    .word-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.05);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .word-text {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.35;
      color: #f8fafc;
      word-break: break-word;
    }

    .word-text.small { font-size: 22px; }

    .word-answer {
      color: #c7d2fe;
      font-size: 19px;
      font-weight: 600;
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(99, 102, 241, 0.10);
      border: 1px solid rgba(99, 102, 241, 0.18);
      border-radius: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .input-field, .search-field {
      width: 100%;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 500;
      border: 2px solid #334155;
      border-radius: 14px;
      background: #0f172a;
      color: #f8fafc;
      text-align: left;
      outline: none;
      transition: all 0.2s;
    }

    .search-field { text-align: left; font-size: 16px; }

    .input-field::placeholder, .search-field::placeholder { color: #475569; }

    .input-field:focus, .search-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    .input-field.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
    .input-field.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary { background: #1e293b; color: #f8fafc; border: 1px solid #334155; }
    .btn-success { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
    .btn-warning { background: linear-gradient(135deg, #eb1717 0%, #c40000 100%); color: white; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.25); }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-row .btn { flex: 1; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option-btn {
      padding: 16px 16px;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 16px;
      color: #f8fafc;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      line-height: 1.45;
      word-break: break-word;
    }

    .option-btn:active { transform: scale(0.97); }
    .option-btn.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.2); animation: pulse 0.3s ease-out; }
    .option-btn.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); animation: shake 0.4s ease-out; }

    .feedback { text-align: center; padding: 20px 0; }
    .feedback-icon { font-size: 56px; margin-bottom: 12px; }
    .feedback-text { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .feedback-text.success { color: #22c55e; }
    .feedback-text.error { color: #ef4444; }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 600;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #94a3b8;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .hint-btn {
      background: transparent;
      border: none;
      color: #64748b;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 auto;
    }

    .hint-text {
      text-align: center;
      color: #eab308;
      font-size: 14px;
      margin-top: 12px;
      padding: 8px 16px;
      background: rgba(234, 179, 8, 0.1);
      border-radius: 8px;
      line-height: 1.45;
    }

    .person-list { max-height: 460px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .person-item {
      padding: 14px 0;
      border-bottom: 1px solid #334155;
    }

    .person-item:last-child { border-bottom: none; }

    .person-main { min-width: 0; }
    .person-name { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 4px; }
    .person-position { color: #94a3b8; font-size: 14px; line-height: 1.4; }

    .result-emoji { max-height: 460px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .person-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #334155;
    }

    .person-item:last-child { border-bottom: none; }

    .mini-avatar {
      width: 52px;
      height: 52px;
      min-width: 52px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }

    .mini-avatar .avatar-inner { font-size: 15px; }
    .mini-avatar .avatar-initials { font-size: 15px; }
    .mini-avatar .avatar-hint { display: none; }

    .person-main { flex: 1; min-width: 0; }
    .person-name { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 4px; }
    .person-position { color: #94a3b8; font-size: 14px; line-height: 1.4; }

    .result-emoji { font-size: 80px; margin-bottom: 20px; animation: bounceIn 0.6s ease-out; }
    .result-title { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
    .result-stats { display: flex; justify-content: space-around; margin-bottom: 24px; gap: 8px; }
    .result-stat { text-align: center; }
    .result-stat .num { font-size: 36px; font-weight: 800; }
    .result-stat .label { font-size: 12px; color: #64748b; margin-top: 4px; }
    .result-time { text-align: center; color: #64748b; font-size: 15px; margin-bottom: 22px; }

    .divider { height: 1px; background: #334155; margin: 18px 0; }
    .text-center { text-align: center; }
    .text-muted { color: #64748b; }
    .mb-12 { margin-bottom: 12px; }
    .mb-16 { margin-bottom: 16px; }

    .app-footer {
      margin-top: auto;
      padding: 14px 10px 4px;
      text-align: center;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.92;
    }

    .app-footer span {
      display: inline-block;
      padding: 10px 14px;
      background: rgba(15, 23, 42, 0.42);
      border: 1px solid rgba(148, 163, 184, 0.10);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>

    const STORAGE_KEYS = {
      progress: "fio-position-trainer-progress-v2",
      session: "fio-position-trainer-session-v2"
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/ё/g, "е")
        .replace(/[«»"']/g, "")
        .replace(/[()]/g, " ")
        .replace(/[.,:;!?]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function vibrate(pattern = 8) { if (navigator.vibrate) navigator.vibrate(pattern); }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n;
      if (!n) return m;
      const dp = Array.from({ length: n + 1 }, (_, i) => [i]);
      for (let j = 1; j <= m; j++) dp[0][j] = j;
      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= m; j++) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (b[i - 1] === a[j - 1] ? 0 : 1)
          );
        }
      }
      return dp[n][m];
    }

    function checkAnswer(input, correct) {
      const a = normalizeText(input);
      const b = normalizeText(correct);
      if (!a || !b) return false;
      if (a === b) return true;
      const maxDistance = b.length > 40 ? 3 : b.length > 20 ? 2 : 1;
      return levenshtein(a, b) <= maxDistance;
    }

    function formatTime(ms) {
      const sec = Math.floor(ms / 1000);
      const min = Math.floor(sec / 60);
      const rest = sec % 60;
      return min > 0 ? `${min} мин ${rest} сек` : `${rest} сек`;
    }

    function getModeQuestionText(mode) { return mode === "name-to-position" ? "Напиши должность" : "Напиши ФИО"; }
    function getModeLabel(mode) { return mode === "name-to-position" ? "ФИО → должность" : "Должность → ФИО"; }
    function promptLabelForFilter(mode) { return mode === "name-to-position" ? "Ты уже знаешь должность этого человека?" : "Ты уже узнаёшь человека по этой должности?"; }

    function shortHint(text) {
      const words = String(text).split(/\s+/).filter(Boolean);
      if (words.length === 1) return words[0].slice(0, 2).toUpperCase() + "…";
      return words.slice(0, 2).map(w => w.charAt(0).toUpperCase() + "…").join(" ");
    }

    function currentChallenge(card, mode) {
      return mode === "name-to-position"
        ? { ask: card.name, answer: card.position, chip: "ФИО" }
        : { ask: card.position, answer: card.name, chip: "Должность" };
    }

    function getSurname(fullName) { return String(fullName || "").trim().split(/\s+/)[0] || fullName; }

    function getOptions(correctIdx, mode) {
      const correct = PEOPLE[correctIdx];
      const answerField = mode === "name-to-position" ? "position" : "name";
      const pool = PEOPLE
        .map((item, index) => ({ index, value: item[answerField] }))
        .filter(item => item.index !== correctIdx && normalizeText(item.value) !== normalizeText(correct[answerField]));
      const picked = [correctIdx];
      const shuffled = shuffle(pool);
      while (picked.length < 4 && shuffled.length) {
        const next = shuffled.pop();
        if (!picked.includes(next.index)) picked.push(next.index);
      }
      return shuffle(picked);
    }

    function hashDataset() {
      let s = "";
      for (const p of PEOPLE) s += p.name + "|" + p.position + "§";
      let hash = 5381;
      for (let i = 0; i < s.length; i++) hash = ((hash << 5) + hash) + s.charCodeAt(i);
      return (hash >>> 0).toString(16);
    }

    let state = {
      screen: "menu",
      phase: 0,
      mode: "name-to-position",
      pool: [], known: [], toLearn: [], queue: [], currentIdx: 0,
      input: "", feedback: null, selectedOption: null, options: [], hintShown: false,
      startTime: null, stats: { correct: 0, wrong: 0 }, streak: 0, maxStreak: 0,
      wordErrors: {}, lastResults: null, search: ""
    };

    function saveProgress() {
      const data = { datasetHash: hashDataset(), maxStreak: state.maxStreak };
      localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(data));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.progress);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.datasetHash !== hashDataset()) return;
        state.maxStreak = Number(data.maxStreak) || 0;
      } catch (e) {}
    }

    function getSessionSnapshot() {
      return { ...state };
    }

    function saveSession() {
      if (["menu", "results", "directory"].includes(state.screen)) {
        localStorage.removeItem(STORAGE_KEYS.session);
        return;
      }
      const payload = { datasetHash: hashDataset(), savedAt: Date.now(), state: getSessionSnapshot() };
      localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(payload));
    }

    function loadSession() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.session);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (data.datasetHash !== hashDataset()) return null;
        return data.state || null;
      } catch (e) { return null; }
    }

    function clearSession() { localStorage.removeItem(STORAGE_KEYS.session); }

    function resetSessionState() {
      state.phase = 0; state.pool = []; state.known = []; state.toLearn = []; state.queue = []; state.currentIdx = 0;
      state.input = ""; state.feedback = null; state.selectedOption = null; state.options = []; state.hintShown = false;
      state.startTime = null; state.stats = { correct: 0, wrong: 0 }; state.streak = 0; state.wordErrors = {};
    }

    function goMenu() { resetSessionState(); state.screen = "menu"; render(); }

    function continueSession() {
      const saved = loadSession();
      if (!saved) return startTraining();
      state = { ...state, ...saved };
      if (state.screen === "choice" && (!Array.isArray(state.options) || state.options.length < 2)) {
        state.options = getOptions(getCurrentPersonIndex(), state.mode);
      }
      render(); focusInput();
    }

    function startTraining(mode = state.mode) {
      resetSessionState(); state.screen = "filter"; state.phase = 1; state.mode = mode;
      state.pool = shuffle(PEOPLE.map((_, index) => index)); state.startTime = Date.now(); render();
    }

    function startQuickPractice() {
      resetSessionState(); state.phase = 4; state.screen = "typing";
      state.toLearn = shuffle(PEOPLE.map((_, i) => i)).slice(0, Math.min(10, PEOPLE.length));
      state.queue = [...state.toLearn]; state.startTime = Date.now(); render(); focusInput();
    }

    function startMistakePractice() {
      const last = state.lastResults;
      if (!last || !last.mistakes || !last.mistakes.length) return;
      resetSessionState(); state.mode = last.mode || state.mode; state.phase = 4; state.screen = "typing";
      state.toLearn = [...last.mistakes]; state.queue = shuffle([...last.mistakes]); state.startTime = Date.now(); render(); focusInput();
    }

    function markKnown(isKnown) {
      vibrate(6);
      const idx = state.pool[state.currentIdx];
      if (isKnown) state.known.push(idx); else state.toLearn.push(idx);
      state.currentIdx += 1;
      if (state.currentIdx >= state.pool.length) return !state.toLearn.length ? showResults() : startChoicePhase();
      render();
    }

    function startChoicePhase() {
      state.phase = 2; state.screen = "choice"; state.queue = shuffle([...state.toLearn]); state.currentIdx = 0;
      state.stats = { correct: 0, wrong: 0 }; state.feedback = null; state.selectedOption = null;
      state.options = getOptions(getCurrentPersonIndex(), state.mode); render();
    }

    function startTypingPhase() {
      state.phase = 3; state.screen = "typing"; state.queue = shuffle([...state.toLearn]); state.currentIdx = 0;
      state.stats = { correct: 0, wrong: 0 }; state.feedback = null; state.selectedOption = null; state.input = "";
      state.hintShown = false; state.wordErrors = {}; render(); focusInput();
    }

    function startFinalPhase() {
      state.phase = 4; state.screen = "typing"; state.queue = shuffle([...state.toLearn]); state.currentIdx = 0;
      state.stats = { correct: 0, wrong: 0 }; state.feedback = null; state.selectedOption = null; state.input = ""; state.hintShown = false;
      render(); focusInput();
    }

    function getCurrentPersonIndex() { return state.queue[state.currentIdx]; }
    function getCurrentPerson() { return PEOPLE[getCurrentPersonIndex()]; }

    function addToQueue(idx) {
      const insertAt = Math.min(state.currentIdx + 2 + Math.floor(Math.random() * 3), state.queue.length);
      state.queue.splice(insertAt, 0, idx);
    }

    function nextStep() {
      state.currentIdx += 1; state.feedback = null; state.selectedOption = null; state.input = ""; state.hintShown = false;
      if (state.currentIdx >= state.queue.length) {
        if (state.phase === 2) return startTypingPhase();
        if (state.phase === 3) {
          const mistakes = Object.keys(state.wordErrors).filter(key => state.wordErrors[key] > 0).map(Number);
          if (mistakes.length > 0 && mistakes.length < state.toLearn.length) { state.toLearn = [...mistakes]; return startTypingPhase(); }
          return startFinalPhase();
        }
        return showResults();
      }
      if (state.screen === "choice") state.options = getOptions(getCurrentPersonIndex(), state.mode);
      render(); focusInput();
    }

    function handleChoice(optionIdx) {
      if (state.feedback) return;
      const correctIdx = getCurrentPersonIndex();
      const correct = optionIdx === correctIdx;
      state.selectedOption = optionIdx; state.feedback = correct ? "correct" : "wrong";
      if (correct) { state.stats.correct += 1; state.streak += 1; state.maxStreak = Math.max(state.maxStreak, state.streak); vibrate(8); }
      else { state.stats.wrong += 1; state.streak = 0; state.wordErrors[correctIdx] = (state.wordErrors[correctIdx] || 0) + 1; addToQueue(correctIdx); vibrate([35,20,35]); }
      render(); setTimeout(nextStep, correct ? 420 : 1100);
    }

    function submitTyping() {
      if (state.feedback) return nextStep();
      if (!state.input.trim()) return;
      const idx = getCurrentPersonIndex();
      const challenge = currentChallenge(getCurrentPerson(), state.mode);
      const correct = checkAnswer(state.input, challenge.answer);
      state.feedback = correct ? "correct" : "wrong";
      if (correct) { state.stats.correct += 1; state.streak += 1; state.maxStreak = Math.max(state.maxStreak, state.streak); vibrate(8); }
      else { state.stats.wrong += 1; state.streak = 0; if (state.phase !== 4) { state.wordErrors[idx] = (state.wordErrors[idx] || 0) + 1; addToQueue(idx); } vibrate([35,20,35]); }
      render();
    }

    function skipTyping() {
      if (state.feedback) return;
      const idx = getCurrentPersonIndex();
      state.feedback = "wrong"; state.stats.wrong += 1; state.streak = 0;
      if (state.phase !== 4) { state.wordErrors[idx] = (state.wordErrors[idx] || 0) + 1; addToQueue(idx); }
      vibrate([35,20,35]); render();
    }

    function showResults() {
      state.screen = "results";

    }

          <button class="menu-btn" onclick="startTraining()"><span class="menu-btn-icon">🔄</span><div class="menu-btn-text">Начать с начала<div class="menu-btn-sub">Сбросить текущий сеанс</div></div></button>

        </div>`;

    function renderTyping() {
      const idx = getCurrentPersonIndex(); const person = PEOPLE[idx]; const challenge = currentChallenge(person, state.mode);

          <div class="word-section"><div class="word-label">${isFinal ? '🏁 Финальная проверка' : '⌨️ Точный ввод'}</div><div class="word-text ${challenge.ask.length > 58 ? 'small' : ''}">${escapeHtml(challenge.ask)}</div></div>

      const accuracy = total ? Math.round((result.stats.correct / total) * 100) : 100;
      let title = 'Отличный результат', emoji = '🏆';
      if (!result.toLearn.length && result.known.length) { title = 'Ты уже хорошо ориентируешься'; emoji = '🧠'; }
      else if (accuracy < 60) { title = 'Нужно повторить'; emoji = '📌'; }
      else if (accuracy < 85) { title = 'Неплохо'; emoji = '👍'; }
      return `

          <div class="result-stats">
            <div class="result-stat"><div class="num" style="color:#22c55e;">${result.known.length}</div><div class="label">Сразу знал</div></div>
            <div class="result-stat"><div class="num" style="color:#6366f1;">${result.toLearn.length}</div><div class="label">Прошёл</div></div>
            <div class="result-stat"><div class="num" style="color:#eab308;">${accuracy}%</div><div class="label">Точность</div></div>
          </div>
          <div class="result-time">⏱ ${formatTime(result.timeSpent)} • 🔥 ${result.maxStreak}</div>
          ${result.mistakes.length ? `<div class="divider"></div><div class="mb-12" style="font-weight:700;">Карточки с ошибками</div><div class="person-list">${result.mistakes.map(idx => `<div class="person-item"><div class="person-main"><div class="person-name">${escapeHtml(PEOPLE[idx].name)}</div><div class="person-position">${escapeHtml(PEOPLE[idx].position)}</div></div></div>`).join('')}</div>` : `<div class="divider"></div><div class="text-muted">Ошибок нет. Можно переключить режим и пройти ещё раз.</div>`}
          <div class="btn-row" style="margin-top:18px;"><button class="btn btn-primary" onclick="startTraining('${result.mode || state.mode}')">Ещё раз</button>${result.mistakes.length ? `<button class="btn btn-secondary" onclick="startMistakePractice()">Только ошибки</button>` : ''}</div>
          <button class="menu-btn" style="margin-top:12px; margin-bottom:0;" onclick="goMenu()"><span class="menu-btn-icon">🏠</span><div class="menu-btn-text">На главную<div class="menu-btn-sub">Вернуться в меню</div></div></button>
        </div>`;
    }

    function renderDirectory() {
      const query = normalizeText(state.search);
      const filtered = PEOPLE.filter(item => normalizeText(item.name + ' ' + item.position + ' ' + getSurname(item.name)).includes(query));
      return `
        ${renderHeader(`Список карточек • ${filtered.length} / ${PEOPLE.length}`)}
        <div class="card"><input class="search-field" type="text" placeholder="Поиск по ФИО, фамилии или должности..." value="${escapeHtml(state.search)}" oninput="state.search=this.value; render()" autocomplete="off" spellcheck="false"></div>
        <div class="card"><div class="person-list">${filtered.length ? filtered.map(item => `<div class="person-item"><div class="person-main"><div class="person-name">${escapeHtml(item.name)}</div><div class="person-position">${escapeHtml(item.position)}</div></div></div>`).join('') : `<div class="text-center text-muted">Ничего не найдено.</div>`}</div></div>
        <button class="menu-btn primary" onclick="startTraining()"><span class="menu-btn-icon">🚀</span><div class="menu-btn-text">Начать обучение<div class="menu-btn-sub">Полный цикл с текущим режимом</div></div></button>`;
    }


    function renderFooter() {
      return `<div class="app-footer"><span>Сделано с любовью для кандидатов и бойцов СПО «Дельта»</span></div>`;
    }

    function render() {
      const root = document.getElementById('app');
      let html = '';
      if (state.screen === 'menu') html = renderMenu();
      else if (state.screen === 'filter') html = renderFilter();
      else if (state.screen === 'choice') html = renderChoice();
      else if (state.screen === 'typing') html = renderTyping();
      else if (state.screen === 'results') html = renderResults();
      else if (state.screen === 'directory') html = renderDirectory();
      root.innerHTML = html + renderFooter(); saveSession();
    }

    loadProgress(); render();
  </script>
</body>
</html>
